name: Dependencies Bump

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  bump:
    permissions:
      contents: read
    uses: donniean/hub/.github/workflows/dependencies.bump.yaml@main
    with:
      app-client-id: ${{ vars.APP_CLIENT_ID }}
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
